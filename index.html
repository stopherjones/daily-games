<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Puzzles & Games Hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.jpg">
    <link rel="shortcut icon" href="favicon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="header-title">
                <h1>Daily Games Hub</h1>
            </div>
            <button id="reset-done-btn" class="btn-reset">Reset Done</button>
        </div>

        <section class="controls-toolbar" aria-label="Game filters">
            <details class="filter-collapse" open>
                <summary>
                    <span>Search & filters</span>
                    <span class="summary-icon">▾</span>
                </summary>
                <div class="filter-panel">
                    <div class="control-group filter-box">
                        <select id="sort-filter">
                            <option value="json-order" selected>Default / JSON order</option>
                            <option value="plays-desc">Play count high to low</option>
                            <option value="plays-asc">Play count low to high</option>
                            <option value="name-asc">Name A-Z</option>
                            <option value="name-desc">Name Z-A</option>
                            <option value="lastplayed-asc">Last played oldest to newest</option>
                            <option value="lastplayed-desc">Last played newest to oldest</option>
                        </select>
                    </div>
                    <div class="control-group search-box">
                        <input type="text" id="game-search" placeholder="Search games by name or description...">
                    </div>
                    <div class="control-group filter-box">
                        <select id="category-filter">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                    <div class="control-group filter-box">
                        <select id="mechanic-filter">
                            <option value="all">All Mechanics</option>
                        </select>
                    </div>
                    <div class="control-group filter-box">
                        <select id="duration-filter">
                            <option value="all">All Durations</option>
                        </select>
                    </div>
                </div>
            </details>

        </section>
    </header>

    <main class="container">

        <section class="games-grid" id="games-grid" aria-label="Curated Games Lineup">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your puzzle deck...</p>
            </div>
        </section>

        <hr class="section-divider">

    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Daily Games Hub &bull; Keep the streaks alive.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
