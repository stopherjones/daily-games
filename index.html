<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Puzzles & Games Hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.jpg">
    <link rel="shortcut icon" href="favicon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="header-title">
                <h1>Daily Games Hub</h1>
            </div>
            <button id="reset-done-btn" class="btn-reset">Reset Done</button>
        </div>

        <section class="controls-toolbar" aria-label="Game filters">
            <details class="filter-collapse" open>
                <summary>
                    <span>Search & filters</span>
                    <span class="summary-icon">▾</span>
                </summary>
                <div class="filter-panel">
                    <div class="control-group search-box">
                        <input type="text" id="game-search" placeholder="Search games by name or description...">
                    </div>
                    <div class="control-group filter-box">
                        <select id="category-filter">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                    <div class="control-group filter-box">
                        <select id="mechanic-filter">
                            <option value="all">All Mechanics</option>
                        </select>
                    </div>
                    <div class="control-group filter-box">
                        <select id="duration-filter">
                            <option value="all">All Durations</option>
                        </select>
                    </div>
                </div>
            </details>

            <div class="control-group toggle-box">
                <label for="essential-toggle">
                    <input type="checkbox" id="essential-toggle">
                    Daily Essentials Only
                </label>
            </div>

            <div class="control-group toggle-box">
                <label for="hide-completed-toggle">
                    <input type="checkbox" id="hide-completed-toggle">
                    Hide Completed
                </label>
            </div>

            <button id="random-game-btn" class="btn-accent">Surprise Me</button>
        </section>
    </header>

    <main class="container">

        <section class="games-grid" id="games-grid" aria-label="Curated Games Lineup">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your puzzle deck...</p>
            </div>
        </section>

        <hr class="section-divider">

        <section class="leaderboard-section">
            <h2>Play count</h2>
            <div class="table-container">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th id="leaderboard-played-header" scope="col" class="sortable-header" aria-sort="descending">
                                Played <span class="sort-indicator">▼</span>
                            </th>
                            <th id="leaderboard-name-header" scope="col" class="sortable-header" aria-sort="none">
                                Game Name <span class="sort-indicator"></span>
                            </th>
                            <th id="leaderboard-lastplayed-header" scope="col" class="sortable-header" aria-sort="none">
                                Last Played <span class="sort-indicator"></span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Daily Games Hub &bull; Keep the streaks alive.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
