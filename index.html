<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Puzzles & Games Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1>Daily Games Hub</h1>
        </div>

        <section class="controls-toolbar" aria-label="Game filters">
            <details class="filter-collapse">
                <summary>
                    <span>Search & filters</span>
                    <span class="summary-icon">▾</span>
                </summary>
                <div class="filter-panel">
                    <div class="control-group search-box">
                        <input type="text" id="game-search" placeholder="Search games by name or description...">
                    </div>
                    <div class="control-group filter-box">
                        <select id="category-filter">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                    <div class="control-group filter-box">
                        <select id="mechanic-filter">
                            <option value="all">All Mechanics</option>
                        </select>
                    </div>
                    <div class="control-group filter-box">
                        <select id="duration-filter">
                            <option value="all">All Durations</option>
                        </select>
                    </div>
                </div>
            </details>

            <div class="control-group toggle-box">
                <label for="essential-toggle">
                    <input type="checkbox" id="essential-toggle">
                    Daily Essentials Only
                </label>
            </div>

            <div class="control-group toggle-box">
                <label for="hide-completed-toggle">
                    <input type="checkbox" id="hide-completed-toggle">
                    Hide Completed
                </label>
            </div>

            <button id="random-game-btn" class="btn-accent">Surprise Me</button>
        </section>
    </header>

    <main class="container">

        <section class="games-grid" id="games-grid" aria-label="Curated Games Lineup">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your puzzle deck...</p>
            </div>
        </section>

        <hr class="section-divider">

        <section class="leaderboard-section">
            <h2>Current Streaks & Standings</h2>
            <div class="table-container">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th scope="col">Rank</th>
                            <th scope="col">Game Name</th>
                            <th scope="col">Current Streak</th>
                            <th scope="col">Personal Best</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr class="rank-1">
                            <td>1</td>
                            <td>Wordle</td>
                            <td>18 Days</td>
                            <td>2/6 Attempts</td>
                        </tr>
                        <tr class="rank-2">
                            <td>2</td>
                            <td>Connections</td>
                            <td>12 Days</td>
                            <td>Perfect Split</td>
                        </tr>
                        <tr class="rank-3">
                            <td>3</td>
                            <td>Mini Crossword</td>
                            <td>5 Days</td>
                            <td>0:42 Seconds</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Daily Games Hub &bull; Keep the streaks alive.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
